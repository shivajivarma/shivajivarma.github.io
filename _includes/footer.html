<footer class="footer" itemscope itemtype="http://schema.org/WPFooter">
  <div class="section-container">
    <div class="social-links">
      <goat-text inline expressive>Follow me</goat-text>
      <div class="social-links__links">
        <wc-icon-button name="logo--twitter" provider="carbon"
                     href="https://twitter.com/{{ site.author.twitter }}"
                     title="Twitter"
                     variant='text'
                     color='surface'
                     dark-mode-color='light'
                     rel="noopener"
        ></wc-icon-button>
        <wc-icon-button name="logo--linkedin" provider="carbon"
                     href="https://www.linkedin.com/in/{{ site.author.linkedin }}"
                     title="LinkedIn"
                     variant='ghost'
                     color='dark'
                     dark-mode-color='light'
                     rel="noopener"
        ></wc-icon-button>
        <wc-icon-button name="logo--github" provider="carbon"
                     href="https://github.com/{{ site.author.github }}"
                     title="Github"
                     variant='text'
                     color='surface'
                     dark-mode-color='light'
                     rel="noopener"
        ></wc-icon-button>
        <wc-icon-button name="logo--youtube" provider="carbon"
                     href="https://youtube.com/c/{{ site.author.youtube }}"
                     title="Youtube"
                     variant='text'
                     color='surface'
                     rel="noopener"
                     ></wc-icon-button>
        <wc-icon-button name="email" provider="carbon"
                     href="mailto:{{site.email}}"
                     title="Mail"
                     variant='text'
                     color='surface'
                     rel="noopener"
                     ></wc-icon-button>
      </div>
    </div>
    <div class="first-row">
      <div class="logo">
        <img src="/assets/img/logo.webp" alt="Shivaji Varma Logo"></img>
        <goat-divider vertical></goat-divider>
        <goat-text>Shivaji Varma</goat-text>
      </div>
      <div class="global-links">
        <goat-link href="{{ site.baseurl }}/privacy">Privacy</goat-link>
        <goat-link rel="license noopener" href="{{ site.baseurl }}/LICENSE">License</goat-link>
      </div>
    </div>
  </div>
</footer>
